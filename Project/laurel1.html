 <style>

 #myRange {
 -webkit-appearance: none;

<body>

   


<div id="home" class="button"><a href="./homePage.html"><img class= "icon" src="./icons/home.png"></a>Return</div><div id="research" class="button"> <a href="./laurel2.html"><img class="icon" src="./icons/research.png"></a></br>Show Verified Observations</div>
<h1 class="head">Mountain laurel</h1> 
<h2>"Description"</h2>
<h2 class="type">Observation Type: Needs ID</h2>
<h2 id="theYearID"></h2>
<div id="slider"><input id="myRange" type="range" name="year" value="0" min="0" max="10" oninput="moveSlider(this.value)"></div>

 </br>



<br>

     <div id="map"></div>

     <script>


const first = [];
const second = [];
const third = [];
const fourth = [];
const fifth = [];
const sixth = [];
const seventh = [];
const eigth = [];
const ninth = [];
const tenth = [];
const eleventh = [];
const initialLength =  laurel.features.length; 


 
for (let i = 0; i < initialLength; i++) { 
  if (laurel.features[i].properties.observed_on <= 2015 && laurel.features[i].properties.quality_grade == "needs_id") first.push(laurel.features[i]); // Add a new element
if (laurel.features[i].properties.observed_on <= 2016 && laurel.features[i].properties.quality_grade == "needs_id") second.push(laurel.features[i]);
 if (laurel.features[i].properties.observed_on <= 2017 && laurel.features[i].properties.quality_grade == "needs_id") third.push(laurel.features[i]) ;
     if (laurel.features[i].properties.observed_on <= 2018 && laurel.features[i].properties.quality_grade == "needs_id") fourth.push(laurel.features[i]);
   if (laurel.features[i].properties.observed_on <= 2019 && laurel.features[i].properties.quality_grade == "needs_id") fifth.push(laurel.features[i]);
   if (laurel.features[i].properties.observed_on <= 2020 && laurel.features[i].properties.quality_grade == "needs_id") sixth.push(laurel.features[i]);
    if (laurel.features[i].properties.observed_on <= 2021 && laurel.features[i].properties.quality_grade == "needs_id") seventh.push(laurel.features[i]);
    if (laurel.features[i].properties.observed_on <= 2022 && laurel.features[i].properties.quality_grade == "needs_id") eigth.push(laurel.features[i]);
    if (laurel.features[i].properties.observed_on <= 2023 && laurel.features[i].properties.quality_grade == "needs_id") ninth.push(laurel.features[i]);
     if (laurel.features[i].properties.observed_on <= 2024 && laurel.features[i].properties.quality_grade == "needs_id") tenth.push(laurel.features[i]);
   if (laurel.features[i].properties.observed_on <= 2025 && laurel.features[i].properties.quality_grade == "needs_id") eleventh.push(laurel.features[i]);

};


    var map = L.map('map').setView([35.08395557927643, -78.96424437476544],7 );
        
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
	attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
}).addTo(map);


var Icon_w = L.icon({
    iconUrl: './icons/laurel.png',
  

    iconSize:     [50, 50], // size of the icon
  
    iconAnchor:   [10, 10], // point of the icon which will correspond to marker's location
   
});


     var myData = [first, second, third, fourth, fifth, sixth, seventh, eigth, ninth, tenth, eleventh] // array ordering the data 
     var order = ['2015','2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025'] // an array with the date of each data source
     var points = L.geoJSON(myData[0],{
            pointToLayer: function(feature,latlng){
                return L.marker(latlng, {icon: Icon_w})
            }
        }).addTo(map); // open the first element of the myData array

     function moveSlider(value){  // function called by the slider, with the value parameter: the value goes from 0 to 2
        var year = myData[value] // get the data based on the slider value
        map.removeLayer(points);// leaflet method to remove a layer 
        // custom icon doesn't work...
        points = L.geoJSON(year, {
            pointToLayer: function(feature, latlng) {
                var myMarker = L.marker(latlng, {
                    icon : Icon_w
                });
                return myMarker;
            }
        }).addTo(map); // add the new layer
        document.getElementById('theYearID').innerHTML = "Year:" + " " + order[value] + " "  + " " + "Total Observations: " +  year.length// change the text above the slider
    };
     moveSlider(0);
    window.onload = function() {
        document.getElementById('myRange').value = 0;  
    };


</script>
</body>
</html>
